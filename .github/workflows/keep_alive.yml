name: Keep Render Server Alive + Weekly Summary

on:
  schedule:
    - cron: '*/10 * * * *'    # keep-alive every 10 min
    - cron: '0 8 * * 0'       # weekly summary every Sunday 8 AM UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          curl -f https://nutritionist-agent-ouvp.onrender.com/ping
          echo "Server is alive!"

  weekly-summary:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Send weekly summary
        run: |
          curl -s -X POST https://nutritionist-agent-ouvp.onrender.com/api/weekly-summary \
            -H "X-Cron-Secret: nutriai-cron-2026" \
            -H "Content-Type: application/json"
