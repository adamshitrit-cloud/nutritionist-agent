name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          curl -f https://nutritionist-agent-ouvp.onrender.com/ping
          echo "Server is alive!"
